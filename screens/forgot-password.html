<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Neo-Nostalgia Chat - Forgot Password</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#17cfcf",
                        "background-light": "#f6f8f8",
                        "background-dark": "#112121",
                        "retro-teal": "#005050",
                        "retro-surface": "rgba(223, 223, 223, 0.85)",
                        "retro-text": "#0D0D0D",
                        "retro-accent": "#000080",
                        "retro-muted": "#808080",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        @layer utilities {
            .bevel-out {
                box-shadow: inset 2px 2px 0px 0px #FFFFFF, inset -2px -2px 0px 0px #808080;
            }
            .bevel-in {
                box-shadow: inset 2px 2px 0px 0px #808080, inset -2px -2px 0px 0px #FFFFFF;
            }
            .active-bevel:active {
                box-shadow: inset 2px 2px 0px 0px #808080, inset -2px -2px 0px 0px #FFFFFF;
                transform: translate(1px, 1px);
            }
            .pixelated {
                image-rendering: pixelated;
            }
        }
    </style>
</head>
<body class="bg-retro-teal min-h-screen flex items-center justify-center font-display text-retro-text antialiased">
<!-- Dialog Box -->
<div class="w-[350px] bg-retro-surface backdrop-blur-[12px] bevel-out rounded flex flex-col shadow-xl">
<!-- Title Bar -->
<div class="bg-retro-accent text-white px-2 py-1 flex justify-between items-center select-none rounded-t bevel-out border-b-2 border-transparent">
<span class="font-bold text-sm tracking-wide">Password Recovery</span>
<button aria-label="Close" class="bevel-out bg-[#DFDFDF] w-5 h-5 flex items-center justify-center active-bevel text-black font-bold text-xs leading-none">
                X
            </button>
</div>
<!-- Content Area -->
<div class="p-4 flex flex-col gap-4">
<div class="flex items-start gap-4">
<!-- Warning Icon (using Material Icon as a substitute for the pixelated asset, styled to fit the vibe) -->
<div class="shrink-0 w-8 h-8 flex items-center justify-center bg-yellow-400 bevel-out border border-black">
<span class="material-symbols-outlined text-black font-bold" style="font-variation-settings: 'FILL' 1;">warning</span>
</div>
<div class="flex-1">
<p class="text-sm leading-snug font-medium text-retro-text mb-3">
                        Enter your registered email address to receive a recovery link.
                    </p>
<label class="block text-sm font-semibold mb-1" for="recovery-email">Email Address:</label>
<input class="w-full bg-white bevel-in border-none h-8 px-2 text-sm text-retro-text focus:ring-0 focus:outline-none focus:border-black focus:border-dotted focus:border-[1px] font-mono placeholder:text-retro-muted" id="recovery-email" placeholder="user@domain.com" type="email"/>
</div>
</div>
<!-- Action Strip -->
<div class="mt-2 pt-3 border-t-2 border-white relative before:absolute before:-top-0.5 before:left-0 before:right-0 before:h-0.5 before:bg-retro-muted flex justify-end gap-2">
<button class="bevel-out bg-[#DFDFDF] px-4 py-1.5 text-sm font-bold active-bevel min-w-[80px] focus:outline-none focus:ring-1 focus:ring-black focus:ring-dotted">
                    Cancel
                </button>
<button class="bevel-out bg-[#DFDFDF] px-4 py-1.5 text-sm font-bold active-bevel min-w-[80px] text-retro-text border-2 border-transparent focus:outline-none focus:border-black focus:border-dotted">
                    Send Link
                </button>
</div>
</div>
</div>
</body></html>
