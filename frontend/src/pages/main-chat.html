<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Neo-Nostalgia Chat v2.4</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bevel-out: inset 2px 2px 0px 0px #FFFFFF, inset -2px -2px 0px 0px #808080;
      --bevel-in:  inset 2px 2px 0px 0px #808080, inset -2px -2px 0px 0px #FFFFFF;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #005050; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .win { display: flex; flex-direction: column; width: 100%; max-width: 1200px; height: 96vh; background: #DFDFDF; box-shadow: var(--bevel-out); }
    .titlebar { background: #000080; color: #fff; height: 24px; display: flex; align-items: center; justify-content: space-between; padding: 0 6px; flex-shrink: 0; user-select: none; }
    .titlebar span { font-size: 13px; font-weight: 700; }
    .titlebar-btns { display: flex; gap: 2px; }
    .win-btn { width: 18px; height: 16px; background: #DFDFDF; box-shadow: var(--bevel-out); border: none; cursor: pointer; font-size: 10px; font-weight: bold; display: flex; align-items: center; justify-content: center; }
    .win-btn:active { box-shadow: var(--bevel-in); }
    .app-body { display: flex; flex: 1; overflow: hidden; }
    /* ── Left sidebar ── */
    .sidebar-left { width: 200px; background: #f6f8f8; border-right: 2px solid #808080; display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
    .sidebar-header { background: #DFDFDF; box-shadow: var(--bevel-out); padding: 4px 8px; font-size: 11px; font-weight: 700; border-bottom: 1px solid #808080; display: flex; align-items: center; justify-content: space-between; }
    #room-list { flex: 1; overflow-y: auto; padding: 2px 0; }
    .room-item { padding: 4px 10px; font-size: 12px; font-family: 'JetBrains Mono', monospace; cursor: pointer; display: flex; align-items: center; gap: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .room-item:hover { background: #000080; color: #fff; }
    .room-item.active { background: #000080; color: #fff; }
    .sidebar-footer { padding: 4px; border-top: 1px solid #808080; flex-shrink: 0; }
    /* ── Center chat ── */
    .chat-area { flex: 1; display: flex; flex-direction: column; background: #fff; overflow: hidden; min-width: 0; }
    .chat-header { background: #DFDFDF; box-shadow: var(--bevel-out); padding: 4px 10px; font-size: 12px; font-weight: 600; border-bottom: 1px solid #808080; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    #messages { flex: 1; overflow-y: auto; padding: 10px 12px; font-family: 'JetBrains Mono', monospace; font-size: 12px; scroll-behavior: smooth; }
    .chat-msg { margin-bottom: 5px; line-height: 1.5; }
    .chat-msg .who { color: #000080; font-weight: 700; cursor: default; }
    .chat-msg .ts  { color: #808080; font-size: 10px; margin-right: 5px; }
    .chat-msg .msg-content { color: #0D0D0D; word-break: break-word; }
    .system-msg { color: #808080; font-style: italic; margin-bottom: 4px; }
    #scroll-sentinel { height: 1px; margin-bottom: 8px; }
    .chat-input-bar { background: #DFDFDF; border-top: 2px solid #808080; display: flex; align-items: center; gap: 6px; padding: 6px 8px; flex-shrink: 0; }
    #msg-input { flex: 1; height: 40px; box-shadow: var(--bevel-in); background: #fff; border: none; padding: 0 8px; font-family: 'JetBrains Mono', monospace; font-size: 13px; outline: none; resize: none; }
    #msg-input:focus { outline: 1px dotted #17cfcf; }
    .send-btn { height: 36px; padding: 0 14px; background: #DFDFDF; box-shadow: var(--bevel-out); border: none; cursor: pointer; font-size: 12px; font-weight: 600; white-space: nowrap; }
    .send-btn:active { box-shadow: var(--bevel-in); }
    .send-btn:disabled { color: #808080; cursor: default; }
    /* ── Right sidebar ── */
    .sidebar-right { width: 160px; background: #f6f8f8; border-left: 2px solid #808080; display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
    #user-list { flex: 1; overflow-y: auto; padding: 2px 0; }
    .user-item { padding: 3px 8px; font-size: 11px; font-family: 'JetBrains Mono', monospace; display: flex; align-items: center; gap: 5px; }
    .presence-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
    /* ── Status bar ── */
    .statusbar { height: 22px; background: #DFDFDF; box-shadow: var(--bevel-out); border-top: 1px solid #808080; display: flex; align-items: center; padding: 0 6px; font-size: 10px; font-family: 'JetBrains Mono', monospace; color: #808080; flex-shrink: 0; gap: 12px; }
    .status-cell { box-shadow: var(--bevel-in); padding: 1px 6px; }
    /* ── Profile ── */
    .profile-btn { cursor: pointer; font-size: 11px; font-family: 'JetBrains Mono', monospace; background: #DFDFDF; box-shadow: var(--bevel-out); border: none; padding: 2px 8px; }
    .profile-btn:active { box-shadow: var(--bevel-in); }
    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 12px; background: #DFDFDF; border-left: 1px solid #808080; }
    ::-webkit-scrollbar-thumb { background: #DFDFDF; box-shadow: var(--bevel-out); }
    ::-webkit-scrollbar-button { display: block; height: 12px; background: #DFDFDF; box-shadow: var(--bevel-out); }
    /* ── Modal base ── */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 50; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal-box { background: #DFDFDF; box-shadow: var(--bevel-out); border: 1px solid #000; }
    .modal-title { background: #000080; color: #fff; padding: 4px 8px; font-size: 13px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
    .modal-body { padding: 12px; display: flex; flex-direction: column; gap: 10px; font-size: 13px; }
    .modal-footer { padding: 8px 12px; display: flex; justify-content: flex-end; gap: 8px; border-top: 1px solid #808080; }
    .modal-btn { background: #DFDFDF; box-shadow: var(--bevel-out); border: 1px solid #000; padding: 4px 14px; cursor: pointer; font-size: 12px; }
    .modal-btn:active { box-shadow: var(--bevel-in); }
    /* ── Reply bar ── */
    #reply-bar { display: none; align-items: center; gap: 8px; padding: 3px 8px; background: #e8e8e8; border-top: 1px solid #808080; font-size: 11px; font-family: 'JetBrains Mono', monospace; flex-shrink: 0; }
    #reply-bar.visible { display: flex; }
    #reply-label { flex: 1; color: #000080; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .reply-cancel-btn { background: none; border: none; cursor: pointer; font-size: 14px; color: #808080; }
    /* ── Create room modal ── */
    .form-row { display: flex; flex-direction: column; gap: 4px; }
    .form-label { font-size: 12px; font-weight: 600; }
    .form-input { height: 28px; padding: 0 8px; font-family: 'JetBrains Mono', monospace; font-size: 12px; background: #fff; border: none; box-shadow: var(--bevel-in); outline: none; }
    .form-input:focus { outline: 1px dotted #17cfcf; }
    .os-checkbox { appearance: none; width: 14px; height: 14px; background: #fff; box-shadow: var(--bevel-in); position: relative; cursor: pointer; flex-shrink: 0; }
    .os-checkbox:checked::before { content: ''; position: absolute; top: 1px; left: 3px; width: 5px; height: 9px; border: solid #0D0D0D; border-width: 0 2px 2px 0; transform: rotate(45deg); }
    .error-inline { font-size: 11px; color: #800000; font-family: 'JetBrains Mono', monospace; min-height: 14px; }
  </style>
</head>
<body>
<div class="win">
  <!-- Title Bar -->
  <div class="titlebar">
    <span>Neo-Nostalgia Chat v2.4</span>
    <div class="titlebar-btns">
      <button class="win-btn">_</button>
      <button class="win-btn">□</button>
      <button class="win-btn" id="close-btn">✕</button>
    </div>
  </div>

  <div class="app-body">
    <!-- Left: room list -->
    <div class="sidebar-left">
      <div class="sidebar-header">
        <span>Channels</span>
        <a href="room-catalog.html" style="font-size:10px;color:#000080;text-decoration:none;">[Browse]</a>
      </div>
      <div id="room-list"><div class="room-item" style="color:#808080;">Loading…</div></div>
      <div class="sidebar-footer">
        <button class="send-btn" style="width:100%;font-size:11px;" id="new-room-btn">+ New Room</button>
      </div>
    </div>

    <!-- Center: messages -->
    <div class="chat-area">
      <div class="chat-header">
        <span id="room-title" style="font-family:'JetBrains Mono',monospace;"># select a channel</span>
        <button class="profile-btn" id="profile-btn">⚙ <span id="username-label">…</span></button>
      </div>
      <div id="messages">
        <div class="system-msg">*** Welcome to Neo-Nostalgia Chat. Select a channel. ***</div>
      </div>
      <!-- Reply bar -->
      <div id="reply-bar">
        <span id="reply-label"></span>
        <button class="reply-cancel-btn" id="reply-cancel">✕</button>
      </div>
      <!-- Input -->
      <div class="chat-input-bar">
        <input class="form-input" id="msg-input" style="flex:1;height:40px;" placeholder="Select a channel first…" disabled/>
        <button class="send-btn" id="send-btn" disabled>Send</button>
      </div>
    </div>

    <!-- Right: members -->
    <div class="sidebar-right">
      <div class="sidebar-header" style="font-size:11px;">Members</div>
      <div id="user-list"></div>
    </div>
  </div>

  <div class="statusbar">
    <span class="status-cell" id="status-cell">● disconnected</span>
    <span class="status-cell" id="clock-cell">--:--</span>
  </div>
</div>

<!-- Profile modal -->
<div class="modal-overlay" id="profile-overlay">
  <div class="modal-box" style="width:280px;">
    <div class="modal-title">
      <span>User Profile</span>
      <button class="win-btn" id="profile-close">✕</button>
    </div>
    <div class="modal-body">
      <div><strong>Username:</strong> <span id="pm-username" style="font-family:'JetBrains Mono',monospace;"></span></div>
      <div><strong>Email:</strong> <span id="pm-email" style="font-family:'JetBrains Mono',monospace;font-size:11px;"></span></div>
      <hr style="border-color:#808080;"/>
      <button class="modal-btn" id="logout-btn" style="text-align:left;">Log Out</button>
      <button class="modal-btn" id="delete-btn" style="text-align:left;color:#cc0000;">Delete Account…</button>
    </div>
  </div>
</div>

<!-- Confirm delete modal -->
<div class="modal-overlay" id="confirm-overlay">
  <div class="modal-box" style="width:300px;">
    <div class="modal-title">Confirm Deletion</div>
    <div class="modal-body">
      <p>Permanently delete your account and all owned rooms? Cannot be undone.</p>
    </div>
    <div class="modal-footer">
      <button class="modal-btn" id="confirm-cancel">Cancel</button>
      <button class="modal-btn" id="confirm-ok" style="color:#cc0000;">Delete</button>
    </div>
  </div>
</div>

<!-- Create room modal -->
<div class="modal-overlay" id="create-room-overlay">
  <div class="modal-box" style="width:360px;">
    <div class="modal-title">
      <span>Create New Channel</span>
      <button class="win-btn" id="create-room-close">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label class="form-label">Room Name</label>
        <input id="cr-name" class="form-input" type="text" placeholder="e.g. dev-chat" maxlength="64"/>
      </div>
      <div class="form-row">
        <label class="form-label">Description (optional)</label>
        <input id="cr-desc" class="form-input" type="text" placeholder="What's this room about?"/>
      </div>
      <label style="display:flex;align-items:center;gap:8px;font-size:12px;cursor:pointer;">
        <input id="cr-private" type="checkbox" class="os-checkbox"/> Private (invite-only)
      </label>
      <div class="error-inline" id="cr-error"></div>
    </div>
    <div class="modal-footer">
      <button class="modal-btn" id="cr-cancel">Cancel</button>
      <button class="modal-btn" id="cr-submit" style="background:#17cfcf;color:#fff;">Create</button>
    </div>
  </div>
</div>

<script type="module">
  import * as msgList from '../components/message-list.js';
  import * as msgInput from '../components/message-input.js';

  // ── State ─────────────────────────────────────────────────────────────────
  let currentUser = null;
  let currentRoomId = null;
  let roomWs = null;
  let sentinelCtrl = null;

  // ── Boot ──────────────────────────────────────────────────────────────────
  async function boot() {
    try {
      const res = await fetch('/auth/me', { credentials: 'include' });
      if (res.status === 401) { location.href = 'login.html'; return; }
      currentUser = await res.json();
    } catch { location.href = 'login.html'; return; }

    document.getElementById('username-label').textContent = currentUser.username;
    document.getElementById('pm-username').textContent = currentUser.username;
    document.getElementById('pm-email').textContent = currentUser.email;

    msgList.init({
      currentUserId: currentUser.id,
      onLoadMore: fetchOlderMessages,
      onEdit: handleEdit,
      onDelete: handleDelete,
    });

    await loadRoomList();
    clockTick();
    setInterval(clockTick, 1000);

    // auto-join room from URL param
    const params = new URLSearchParams(location.search);
    const roomParam = params.get('room');
    if (roomParam) selectRoom(parseInt(roomParam));
  }

  // ── Clock ─────────────────────────────────────────────────────────────────
  function clockTick() {
    document.getElementById('clock-cell').textContent =
      new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  // ── Room list ─────────────────────────────────────────────────────────────
  async function loadRoomList() {
    const res = await fetch('/rooms', { credentials: 'include' }).catch(() => null);
    if (!res || !res.ok) return;
    const rooms = await res.json();
    const container = document.getElementById('room-list');
    container.innerHTML = '';
    if (!rooms.length) {
      container.innerHTML = '<div class="room-item" style="color:#808080;font-size:11px;">No channels yet</div>';
      return;
    }
    rooms.forEach(r => {
      const item = document.createElement('div');
      item.className = 'room-item';
      item.dataset.id = r.id;
      item.textContent = '# ' + r.name;
      item.addEventListener('click', () => selectRoom(r.id, r.name));
      container.appendChild(item);
    });
  }

  // ── Select room ───────────────────────────────────────────────────────────
  async function selectRoom(roomId, roomName) {
    if (currentRoomId === roomId) return;
    currentRoomId = roomId;

    // highlight active
    document.querySelectorAll('.room-item').forEach(el => {
      el.classList.toggle('active', parseInt(el.dataset.id) === roomId);
    });

    // disconnect previous WS
    if (roomWs) { roomWs.close(); roomWs = null; }
    if (sentinelCtrl) { sentinelCtrl.disconnect(); sentinelCtrl = null; }

    // update header
    const name = roomName || ('room #' + roomId);
    document.getElementById('room-title').textContent = '# ' + name;
    setStatus('Loading…');

    // clear messages, add sentinel
    msgList.clearMessages();
    const sentinel = document.createElement('div');
    sentinel.id = 'scroll-sentinel';
    document.getElementById('messages').prepend(sentinel);

    // fetch initial messages
    const initialMsgs = await fetchMessages(roomId, null);
    let oldestId = null;
    if (initialMsgs.length) {
      oldestId = msgList.prependMessages(initialMsgs);
    }

    // attach infinite scroll
    sentinelCtrl = msgList.attachSentinel(sentinel);
    if (oldestId !== null) sentinelCtrl.setOldestId(oldestId);

    // scroll to bottom
    const msgEl = document.getElementById('messages');
    msgEl.scrollTop = msgEl.scrollHeight;

    // load members
    loadMembers(roomId);

    // connect room WS
    connectRoomWs(roomId);
  }

  async function fetchMessages(roomId, beforeId) {
    let url = `/rooms/${roomId}/messages?limit=50`;
    if (beforeId) url += `&before=${beforeId}`;
    const res = await fetch(url, { credentials: 'include' }).catch(() => null);
    if (!res || !res.ok) return [];
    return res.json();
  }

  async function fetchOlderMessages(beforeId) {
    if (!currentRoomId) return [];
    return fetchMessages(currentRoomId, beforeId);
  }

  // ── Members sidebar ───────────────────────────────────────────────────────
  async function loadMembers(roomId) {
    const res = await fetch(`/rooms/${roomId}/members`, { credentials: 'include' }).catch(() => null);
    if (!res || !res.ok) return;
    const members = await res.json();
    const container = document.getElementById('user-list');
    container.innerHTML = '';
    members.forEach(m => {
      const item = document.createElement('div');
      item.className = 'user-item';
      const dot = document.createElement('span');
      dot.className = 'presence-dot';
      dot.style.background = m.online ? '#008000' : '#808080';
      const name = document.createElement('span');
      name.textContent = m.username + (m.role === 'admin' ? ' ★' : '');
      item.appendChild(dot);
      item.appendChild(name);
      container.appendChild(item);
    });
  }

  // ── Room WebSocket (T054) ─────────────────────────────────────────────────
  function connectRoomWs(roomId) {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${proto}://${location.host}/ws/rooms/${roomId}`);
    roomWs = ws;

    ws.addEventListener('open', () => {
      setStatus('● connected');
      document.getElementById('msg-input').disabled = false;
      document.getElementById('send-btn').disabled = false;
      msgInput.init({
        ws,
        roomId,
        onSendRest: (content, reply_to_id) => sendRest(content, reply_to_id),
      });
    });

    ws.addEventListener('message', e => {
      let msg;
      try { msg = JSON.parse(e.data); } catch { return; }
      switch (msg.type) {
        case 'message:new':    msgList.appendMessage(msg.payload); break;
        case 'message:edited': msgList.updateMessage(msg.payload); break;
        case 'message:deleted': msgList.removeMessage(msg.payload.id); break;
        case 'presence:update': loadMembers(roomId); break;
        case 'room:joined': break; // ack
        case 'error': setStatus('Error: ' + msg.payload?.detail); break;
      }
    });

    ws.addEventListener('close', () => {
      setStatus('● disconnected — reconnecting…');
      document.getElementById('msg-input').disabled = true;
      document.getElementById('send-btn').disabled = true;
      setTimeout(() => { if (currentRoomId === roomId) connectRoomWs(roomId); }, 3000);
    });
  }

  // ── REST send fallback ────────────────────────────────────────────────────
  async function sendRest(content, reply_to_id) {
    if (!currentRoomId) return;
    const res = await fetch(`/rooms/${currentRoomId}/messages`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ content, reply_to_id }),
    });
    if (res.ok) {
      const msg = await res.json();
      msgList.appendMessage(msg);
    }
  }

  // ── Edit / Delete ─────────────────────────────────────────────────────────
  function handleEdit(msg) {
    msgInput.startEdit(msg, async content => {
      const res = await fetch(`/messages/${msg.id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ content }),
      });
      if (res.ok) {
        const updated = await res.json();
        msgList.updateMessage(updated);
      }
    });
  }

  async function handleDelete(msgId) {
    if (!confirm('Delete this message?')) return;
    const res = await fetch(`/messages/${msgId}`, {
      method: 'DELETE',
      credentials: 'include',
    });
    if (res.ok || res.status === 204) {
      msgList.removeMessage(msgId);
    }
  }

  // ── Reply bar ─────────────────────────────────────────────────────────────
  document.getElementById('reply-cancel').addEventListener('click', () => {
    msgInput.clearReplyTo();
    document.getElementById('reply-bar').classList.remove('visible');
    document.getElementById('reply-label').textContent = '';
  });

  // Override setReplyTo to show bar
  const _origSetReply = msgInput.setReplyTo;
  // Proxy not available for ESM in this simple way, hook via custom event instead
  document.addEventListener('reply:set', e => {
    document.getElementById('reply-label').textContent =
      `Replying to ${e.detail.sender_username}: ${e.detail.content.slice(0, 60)}`;
    document.getElementById('reply-bar').classList.add('visible');
  });

  // ── Status ────────────────────────────────────────────────────────────────
  function setStatus(txt) {
    document.getElementById('status-cell').textContent = txt;
  }

  // ── Create room modal ─────────────────────────────────────────────────────
  document.getElementById('new-room-btn').addEventListener('click', () => {
    document.getElementById('create-room-overlay').classList.add('open');
    document.getElementById('cr-name').focus();
  });
  document.getElementById('create-room-close').addEventListener('click', () => {
    document.getElementById('create-room-overlay').classList.remove('open');
  });
  document.getElementById('cr-cancel').addEventListener('click', () => {
    document.getElementById('create-room-overlay').classList.remove('open');
  });
  document.getElementById('cr-submit').addEventListener('click', async () => {
    const name = document.getElementById('cr-name').value.trim();
    const description = document.getElementById('cr-desc').value.trim() || null;
    const is_private = document.getElementById('cr-private').checked;
    const errEl = document.getElementById('cr-error');
    errEl.textContent = '';
    if (!name) { errEl.textContent = 'Name required.'; return; }
    const res = await fetch('/rooms', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ name, description, is_private }),
    });
    if (res.ok) {
      document.getElementById('create-room-overlay').classList.remove('open');
      document.getElementById('cr-name').value = '';
      document.getElementById('cr-desc').value = '';
      await loadRoomList();
      const room = await res.json();
      selectRoom(room.id, room.name);
    } else {
      const data = await res.json().catch(() => ({}));
      errEl.textContent = data.detail || 'Failed.';
    }
  });

  // ── Profile modal ─────────────────────────────────────────────────────────
  document.getElementById('profile-btn').addEventListener('click', () => {
    document.getElementById('profile-overlay').classList.add('open');
  });
  document.getElementById('profile-close').addEventListener('click', () => {
    document.getElementById('profile-overlay').classList.remove('open');
  });
  document.getElementById('close-btn').addEventListener('click', () => { location.href = 'login.html'; });
  document.getElementById('logout-btn').addEventListener('click', async () => {
    await fetch('/auth/logout', { method: 'POST', credentials: 'include' });
    location.href = 'login.html';
  });
  document.getElementById('delete-btn').addEventListener('click', () => {
    document.getElementById('profile-overlay').classList.remove('open');
    document.getElementById('confirm-overlay').classList.add('open');
  });
  document.getElementById('confirm-cancel').addEventListener('click', () => {
    document.getElementById('confirm-overlay').classList.remove('open');
    document.getElementById('profile-overlay').classList.add('open');
  });
  document.getElementById('confirm-ok').addEventListener('click', async () => {
    const res = await fetch('/auth/account', { method: 'DELETE', credentials: 'include' });
    if (res.ok || res.status === 204) location.href = 'login.html';
  });

  // Send button click
  document.getElementById('send-btn').addEventListener('click', () => {
    document.getElementById('msg-input').dispatchEvent(new KeyboardEvent('keydown', { key: 'Enter', bubbles: true }));
  });

  boot();
</script>
</body>
