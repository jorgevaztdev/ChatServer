<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Admin Dashboard — Neo-Nostalgia Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bevel-out: inset 2px 2px 0px 0px #FFFFFF, inset -2px -2px 0px 0px #808080;
      --bevel-in:  inset 2px 2px 0px 0px #808080, inset -2px -2px 0px 0px #FFFFFF;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #005050;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .win {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 1100px;
      background: #DFDFDF;
      box-shadow: var(--bevel-out);
    }
    .titlebar {
      background: #000080;
      color: #fff;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 6px;
      flex-shrink: 0;
      user-select: none;
    }
    .titlebar span { font-size: 13px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    .titlebar-btns { display: flex; gap: 2px; }
    .win-btn {
      width: 18px; height: 16px;
      background: #DFDFDF;
      box-shadow: var(--bevel-out);
      border: none; cursor: pointer;
      font-size: 10px; font-weight: bold;
      display: flex; align-items: center; justify-content: center;
    }
    .win-btn:active { box-shadow: var(--bevel-in); }

    /* Menu bar */
    .menubar {
      background: #DFDFDF;
      border-bottom: 1px solid #808080;
      padding: 2px 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .menubar-title {
      font-size: 12px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      color: #000;
      flex: 1;
    }
    .refresh-btn {
      height: 24px;
      padding: 0 12px;
      background: #DFDFDF;
      box-shadow: var(--bevel-out);
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
    }
    .refresh-btn:active { box-shadow: var(--bevel-in); }
    .status-pill {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: #808080;
      padding: 1px 6px;
      box-shadow: var(--bevel-in);
    }

    /* Body layout */
    .app-body {
      display: flex;
      gap: 0;
      min-height: 400px;
      overflow: hidden;
    }

    /* Panels */
    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 2px solid #808080;
    }
    .panel:last-child { border-right: none; }
    .panel-header {
      background: #DFDFDF;
      box-shadow: var(--bevel-out);
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      border-bottom: 1px solid #808080;
      flex-shrink: 0;
    }
    .panel-body { flex: 1; overflow-y: auto; padding: 4px; background: #fff; }

    /* Tables */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
    }
    thead tr { background: #DFDFDF; }
    thead th {
      text-align: left;
      padding: 4px 8px;
      font-weight: 700;
      border-bottom: 2px solid #808080;
      white-space: nowrap;
    }
    tbody tr:nth-child(even) { background: #f6f8f8; }
    tbody tr:hover { background: #e0e8ff; }
    tbody td {
      padding: 3px 8px;
      border-bottom: 1px solid #e0e0e0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }
    .empty-row td {
      color: #808080;
      font-style: italic;
      text-align: center;
      padding: 16px;
    }

    /* Status bar */
    .statusbar {
      height: 22px;
      background: #DFDFDF;
      box-shadow: var(--bevel-out);
      border-top: 1px solid #808080;
      display: flex;
      align-items: center;
      padding: 0 6px;
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: #808080;
      flex-shrink: 0;
      gap: 12px;
    }
    .status-cell { box-shadow: var(--bevel-in); padding: 1px 6px; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 12px; background: #DFDFDF; border-left: 1px solid #808080; }
    ::-webkit-scrollbar-thumb { background: #DFDFDF; box-shadow: var(--bevel-out); }
    ::-webkit-scrollbar-button { display: block; height: 12px; background: #DFDFDF; box-shadow: var(--bevel-out); }
  </style>
</head>
<body>
  <div class="win">
    <!-- Title bar -->
    <div class="titlebar">
      <span>Admin Dashboard</span>
      <div class="titlebar-btns">
        <button class="win-btn">_</button>
        <button class="win-btn">&#9633;</button>
        <button class="win-btn" onclick="window.history.back()">X</button>
      </div>
    </div>

    <!-- Menu bar -->
    <div class="menubar">
      <span class="menubar-title">XMPP Server Monitor</span>
      <span class="status-pill" id="last-refresh">Never refreshed</span>
      <button class="refresh-btn" onclick="refresh()">&#8635; Refresh</button>
    </div>

    <!-- Main body -->
    <div class="app-body">
      <!-- Panel 1: Active XMPP Connections -->
      <div class="panel">
        <div class="panel-header">Active XMPP Connections (C2S)</div>
        <div class="panel-body">
          <table>
            <thead>
              <tr>
                <th>JID</th>
                <th>Msg In</th>
                <th>Msg Out</th>
                <th>Connected At</th>
              </tr>
            </thead>
            <tbody id="connections-tbody">
              <tr class="empty-row"><td colspan="4">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Panel 2: Federation Links -->
      <div class="panel">
        <div class="panel-header">Federation Links (S2S)</div>
        <div class="panel-body">
          <table>
            <thead>
              <tr>
                <th>Domain</th>
                <th>Msg In</th>
                <th>Msg Out</th>
                <th>Connected At</th>
              </tr>
            </thead>
            <tbody id="federation-tbody">
              <tr class="empty-row"><td colspan="4">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Status bar -->
    <div class="statusbar">
      <span class="status-cell" id="status-connections">C2S: 0</span>
      <span class="status-cell" id="status-federation">S2S: 0</span>
      <span class="status-cell" id="status-domain">Domain: —</span>
    </div>
  </div>

  <script>
    const API_BASE = '';

    function fmtDate(iso) {
      if (!iso) return '—';
      try {
        const d = new Date(iso);
        return d.toLocaleTimeString();
      } catch { return iso; }
    }

    function renderConnections(data) {
      const tbody = document.getElementById('connections-tbody');
      if (!data || data.length === 0) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="4">No active connections</td></tr>';
        document.getElementById('status-connections').textContent = 'C2S: 0';
        return;
      }
      tbody.innerHTML = data.map(row => `
        <tr>
          <td title="${row.jid}">${row.jid}</td>
          <td>${row.messages_in}</td>
          <td>${row.messages_out}</td>
          <td>${fmtDate(row.connected_at)}</td>
        </tr>
      `).join('');
      document.getElementById('status-connections').textContent = `C2S: ${data.length}`;
    }

    function renderFederation(data) {
      const tbody = document.getElementById('federation-tbody');
      if (!data || data.length === 0) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="4">No active federation links</td></tr>';
        document.getElementById('status-federation').textContent = 'S2S: 0';
        return;
      }
      tbody.innerHTML = data.map(row => `
        <tr>
          <td title="${row.domain}">${row.domain}</td>
          <td>${row.messages_in}</td>
          <td>${row.messages_out}</td>
          <td>${fmtDate(row.connected_at)}</td>
        </tr>
      `).join('');
      document.getElementById('status-federation').textContent = `S2S: ${data.length}`;
    }

    async function refresh() {
      try {
        const [connRes, fedRes] = await Promise.all([
          fetch(`${API_BASE}/admin/jabber/connections`, { credentials: 'include' }),
          fetch(`${API_BASE}/admin/jabber/federation`, { credentials: 'include' })
        ]);

        if (connRes.status === 401 || fedRes.status === 401) {
          window.location.href = '/pages/login.html';
          return;
        }

        if (connRes.ok) {
          const data = await connRes.json();
          renderConnections(data);
        }

        if (fedRes.ok) {
          const data = await fedRes.json();
          renderFederation(data);
        }

        const now = new Date();
        document.getElementById('last-refresh').textContent =
          `Last refresh: ${now.toLocaleTimeString()}`;
      } catch (err) {
        console.error('Refresh error:', err);
        document.getElementById('last-refresh').textContent = 'Error refreshing';
      }
    }

    // Auto-refresh every 5 seconds
    refresh();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
