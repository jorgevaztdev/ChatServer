<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Active Sessions — Neo-Nostalgia Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    :root { --bevel-out: inset 2px 2px 0 #fff, inset -2px -2px 0 #808080; --bevel-in: inset 2px 2px 0 #808080, inset -2px -2px 0 #fff; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #005050; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .win { background: #DFDFDF; box-shadow: var(--bevel-out); width: 600px; max-height: 90vh; display: flex; flex-direction: column; }
    .titlebar { background: #000080; color: #fff; height: 24px; display: flex; align-items: center; justify-content: space-between; padding: 0 6px; user-select: none; flex-shrink: 0; }
    .titlebar span { font-size: 13px; font-weight: 700; }
    .win-btn { width: 18px; height: 16px; background: #DFDFDF; box-shadow: var(--bevel-out); border: none; cursor: pointer; font-size: 10px; font-weight: bold; display: flex; align-items: center; justify-content: center; }
    .win-btn:active { box-shadow: var(--bevel-in); }
    .toolbar { background: #DFDFDF; border-bottom: 1px solid #808080; padding: 6px 12px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .btn { height: 28px; padding: 0 14px; background: #DFDFDF; box-shadow: var(--bevel-out); border: none; cursor: pointer; font-size: 12px; font-weight: 600; }
    .btn:active { box-shadow: var(--bevel-in); }
    .btn-danger { color: #cc0000; }
    .sessions-body { flex: 1; overflow-y: auto; padding: 10px 12px; }
    .session-row { display: flex; align-items: flex-start; gap: 10px; padding: 8px; border-bottom: 1px solid #c8c8c8; font-family: 'JetBrains Mono', monospace; font-size: 11px; }
    .session-row:last-child { border-bottom: none; }
    .session-row.current { background: #e8ffe8; }
    .session-info { flex: 1; }
    .session-info .created { color: #808080; margin-top: 2px; }
    .session-info .ua { color: #444; margin-top: 2px; font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 380px; }
    .session-info .ip { color: #444; font-size: 10px; }
    .current-badge { background: #000080; color: #fff; font-size: 9px; padding: 1px 5px; border-radius: 2px; white-space: nowrap; }
    .revoke-btn { height: 24px; padding: 0 10px; background: #DFDFDF; box-shadow: var(--bevel-out); border: none; cursor: pointer; font-size: 11px; color: #cc0000; flex-shrink: 0; }
    .revoke-btn:active { box-shadow: var(--bevel-in); }
    .revoke-btn:disabled { color: #808080; cursor: default; }
    .empty { color: #808080; font-family: 'JetBrains Mono', monospace; font-size: 12px; padding: 20px; text-align: center; }
    .win-footer { padding: 8px 12px; border-top: 1px solid #808080; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; gap: 8px; }
    .status-msg { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: #444; }
    ::-webkit-scrollbar { width: 12px; background: #DFDFDF; }
    ::-webkit-scrollbar-thumb { background: #DFDFDF; box-shadow: var(--bevel-out); }
  </style>
</head>
<body>
<div class="win">
  <div class="titlebar">
    <span>Active Sessions</span>
    <button class="win-btn" onclick="location.href='main-chat.html'">✕</button>
  </div>
  <div class="toolbar">
    <button class="btn" id="refresh-btn">Refresh</button>
    <button class="btn btn-danger" id="revoke-all-btn">Revoke All Other Sessions</button>
  </div>
  <div class="sessions-body" id="sessions-body">
    <div class="empty">Loading…</div>
  </div>
  <div class="win-footer">
    <span class="status-msg" id="status-msg"></span>
    <button class="btn" onclick="location.href='main-chat.html'">Back to Chat</button>
  </div>
</div>

<script>
  let sessions = [];

  async function loadSessions() {
    document.getElementById('sessions-body').innerHTML = '<div class="empty">Loading…</div>';
    const res = await fetch('/auth/sessions', { credentials: 'include' });
    if (res.status === 401) { location.href = 'login.html'; return; }
    if (!res.ok) { document.getElementById('sessions-body').innerHTML = '<div class="empty">Failed to load sessions.</div>'; return; }
    sessions = await res.json();
    renderSessions();
  }

  function fmtDate(iso) {
    if (!iso) return 'unknown';
    try { return new Date(iso).toLocaleString(); } catch { return iso; }
  }

  function renderSessions() {
    const body = document.getElementById('sessions-body');
    if (!sessions.length) {
      body.innerHTML = '<div class="empty">No active sessions found.</div>';
      return;
    }
    body.innerHTML = '';
    sessions.forEach(s => {
      const row = document.createElement('div');
      row.className = 'session-row' + (s.is_current ? ' current' : '');

      const info = document.createElement('div');
      info.className = 'session-info';

      const top = document.createElement('div');
      top.style.display = 'flex';
      top.style.alignItems = 'center';
      top.style.gap = '6px';

      const idSpan = document.createElement('span');
      idSpan.textContent = `Session #${s.id}`;
      idSpan.style.fontWeight = '700';
      top.appendChild(idSpan);

      if (s.is_current) {
        const badge = document.createElement('span');
        badge.className = 'current-badge';
        badge.textContent = 'CURRENT';
        top.appendChild(badge);
      }

      const created = document.createElement('div');
      created.className = 'created';
      created.textContent = `Created: ${fmtDate(s.created_at)}`;

      const ip = document.createElement('div');
      ip.className = 'ip';
      ip.textContent = `IP: ${s.ip_address || 'unknown'}`;

      const ua = document.createElement('div');
      ua.className = 'ua';
      ua.textContent = s.user_agent || 'unknown user agent';
      ua.title = s.user_agent || '';

      info.appendChild(top);
      info.appendChild(created);
      info.appendChild(ip);
      info.appendChild(ua);

      const revokeBtn = document.createElement('button');
      revokeBtn.className = 'revoke-btn';
      revokeBtn.textContent = s.is_current ? 'Log out' : 'Revoke';
      revokeBtn.addEventListener('click', () => revokeSession(s.id, s.is_current));

      row.appendChild(info);
      row.appendChild(revokeBtn);
      body.appendChild(row);
    });
  }

  async function revokeSession(sessionId, isCurrent) {
    if (isCurrent && !confirm('Log out of current session?')) return;
    const res = await fetch(`/auth/sessions/${sessionId}`, {
      method: 'DELETE',
      credentials: 'include',
    });
    if (res.ok) {
      if (isCurrent) { location.href = 'login.html'; return; }
      setStatus(`Session #${sessionId} revoked.`);
      await loadSessions();
    } else {
      const data = await res.json().catch(() => ({}));
      setStatus('Error: ' + (data.detail || res.status), true);
    }
  }

  async function revokeAllOthers() {
    if (!confirm('Revoke all sessions except the current one?')) return;
    const others = sessions.filter(s => !s.is_current);
    let count = 0;
    for (const s of others) {
      const res = await fetch(`/auth/sessions/${s.id}`, { method: 'DELETE', credentials: 'include' });
      if (res.ok) count++;
    }
    setStatus(`Revoked ${count} session(s).`);
    await loadSessions();
  }

  function setStatus(msg) {
    document.getElementById('status-msg').textContent = msg;
  }

  document.getElementById('refresh-btn').addEventListener('click', loadSessions);
  document.getElementById('revoke-all-btn').addEventListener('click', revokeAllOthers);

  loadSessions();
</script>
</body>
</html>
