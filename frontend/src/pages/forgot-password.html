<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Forgot Password — Neo-Nostalgia Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    :root { --bevel-out: inset 2px 2px 0 #fff, inset -2px -2px 0 #808080; --bevel-in: inset 2px 2px 0 #808080, inset -2px -2px 0 #fff; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #005050; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .win { background: #DFDFDF; box-shadow: var(--bevel-out); width: 360px; }
    .titlebar { background: #000080; color: #fff; height: 24px; display: flex; align-items: center; justify-content: space-between; padding: 0 6px; user-select: none; }
    .titlebar span { font-size: 13px; font-weight: 700; }
    .win-btn { width: 18px; height: 16px; background: #DFDFDF; box-shadow: var(--bevel-out); border: none; cursor: pointer; font-size: 10px; font-weight: bold; display: flex; align-items: center; justify-content: center; }
    .win-btn:active { box-shadow: var(--bevel-in); }
    .win-body { padding: 20px; display: flex; flex-direction: column; gap: 14px; }
    .desc { font-size: 12px; color: #444; font-family: 'JetBrains Mono', monospace; line-height: 1.5; }
    .form-row { display: flex; flex-direction: column; gap: 4px; }
    .form-label { font-size: 12px; font-weight: 600; }
    .form-input { height: 28px; padding: 0 8px; font-family: 'JetBrains Mono', monospace; font-size: 12px; background: #fff; border: none; box-shadow: var(--bevel-in); outline: none; }
    .form-input:focus { outline: 1px dotted #17cfcf; }
    .win-footer { display: flex; justify-content: space-between; align-items: center; padding: 8px 20px 16px; gap: 8px; }
    .btn { height: 28px; padding: 0 16px; background: #DFDFDF; box-shadow: var(--bevel-out); border: none; cursor: pointer; font-size: 12px; font-weight: 600; }
    .btn:active { box-shadow: var(--bevel-in); }
    .btn-primary { background: #000080; color: #fff; }
    .msg { font-size: 11px; font-family: 'JetBrains Mono', monospace; padding: 6px 8px; line-height: 1.4; }
    .msg-err { color: #800000; background: #ffe8e8; box-shadow: var(--bevel-in); }
    .msg-ok  { color: #004000; background: #e8ffe8; box-shadow: var(--bevel-in); }
    /* Reset step */
    #step-reset { display: none; flex-direction: column; gap: 14px; }
    #step-reset.visible { display: flex; }
    #step-request { display: flex; flex-direction: column; gap: 14px; }
    #step-request.hidden { display: none; }
  </style>
</head>
<body>
<div class="win">
  <div class="titlebar">
    <span>Forgot Password</span>
    <button class="win-btn" onclick="location.href='login.html'">✕</button>
  </div>
  <div class="win-body">

    <!-- Step 1: request token -->
    <div id="step-request">
      <p class="desc">Enter your email address. A reset token will be shown — copy it and use it below.</p>
      <div class="form-row">
        <label class="form-label">Email Address</label>
        <input id="fp-email" class="form-input" type="email" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div id="fp-req-msg" style="display:none;"></div>
    </div>

    <!-- Step 2: reset with token -->
    <div id="step-reset">
      <p class="desc">Paste your reset token and enter a new password.</p>
      <div class="form-row">
        <label class="form-label">Reset Token</label>
        <input id="fp-token" class="form-input" type="text" placeholder="Paste token here"/>
      </div>
      <div class="form-row">
        <label class="form-label">New Password</label>
        <input id="fp-newpass" class="form-input" type="password" placeholder="Min 8 characters" autocomplete="new-password"/>
      </div>
      <div id="fp-reset-msg" style="display:none;"></div>
    </div>

  </div>
  <div class="win-footer">
    <a href="login.html" style="font-size:11px;color:#000080;font-family:'JetBrains Mono',monospace;">Back to login</a>
    <div style="display:flex;gap:6px;">
      <button class="btn" id="get-token-btn">Get Token</button>
      <button class="btn btn-primary" id="reset-btn" style="display:none;">Reset Password</button>
    </div>
  </div>
</div>

<script>
  const stepReq   = document.getElementById('step-request');
  const stepReset = document.getElementById('step-reset');
  const getTokenBtn = document.getElementById('get-token-btn');
  const resetBtn  = document.getElementById('reset-btn');

  function showMsg(elId, text, isErr) {
    const el = document.getElementById(elId);
    el.className = 'msg ' + (isErr ? 'msg-err' : 'msg-ok');
    el.textContent = text;
    el.style.display = 'block';
  }

  getTokenBtn.addEventListener('click', async () => {
    const email = document.getElementById('fp-email').value.trim();
    if (!email) { showMsg('fp-req-msg', 'Email required.', true); return; }
    getTokenBtn.disabled = true;
    const res = await fetch('/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
    });
    const data = await res.json().catch(() => ({}));
    if (res.ok) {
      const token = data.token || '';
      showMsg('fp-req-msg',
        `Token: ${token}\n\nCopy this token and use it below to reset your password.`, false);
      // pre-fill token field and switch to step 2
      document.getElementById('fp-token').value = token;
      stepReq.classList.add('hidden');
      stepReset.classList.add('visible');
      getTokenBtn.style.display = 'none';
      resetBtn.style.display = 'block';
    } else {
      showMsg('fp-req-msg', data.detail || 'Request failed.', true);
      getTokenBtn.disabled = false;
    }
  });

  resetBtn.addEventListener('click', async () => {
    const token = document.getElementById('fp-token').value.trim();
    const password = document.getElementById('fp-newpass').value;
    if (!token) { showMsg('fp-reset-msg', 'Token required.', true); return; }
    if (password.length < 8) { showMsg('fp-reset-msg', 'Password must be at least 8 characters.', true); return; }
    resetBtn.disabled = true;
    const res = await fetch('/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, new_password: password }),
    });
    const data = await res.json().catch(() => ({}));
    if (res.ok) {
      showMsg('fp-reset-msg', 'Password reset! Redirecting to login…', false);
      setTimeout(() => { location.href = 'login.html'; }, 2000);
    } else {
      showMsg('fp-reset-msg', data.detail || 'Reset failed.', true);
      resetBtn.disabled = false;
    }
  });

  document.getElementById('fp-email').addEventListener('keydown', e => {
    if (e.key === 'Enter') getTokenBtn.click();
  });
  document.getElementById('fp-newpass').addEventListener('keydown', e => {
    if (e.key === 'Enter') resetBtn.click();
  });
</script>
</body>
</html>
